{% extends 'base.html' %}

{% block title %}Ingreso{% endblock %}

{% block content %}
<section class="panel panel-narrow">
  <h2>{{ title }}</h2>
  <form method="post" class="card-form">
    {% csrf_token %}
    {% if scenario_id %}<input type="hidden" name="scenario_id" value="{{ scenario_id }}">{% endif %}
    {{ form.as_p }}
    <button type="submit" class="btn-primary">Guardar</button>
    <a href="{{ cancel_url|default:'/' }}" class="btn-secondary">Volver</a>
  </form>
</section>
{% endblock %}
